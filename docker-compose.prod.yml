# Production overrides
services:
  php:
    image: ${APP_NAME:-platform}-php:prod
    build:
      target: prod
    volumes: !reset []

  nginx:
    image: ${APP_NAME:-platform}-nginx:prod
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
      target: prod
    volumes: !reset []

  db:
    ports: !reset []
