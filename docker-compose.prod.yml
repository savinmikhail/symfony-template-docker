# Production overrides
x-security-defaults: &security-defaults
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

services:
  php:
    <<: *security-defaults
    image: ${APP_NAME:-platform}-php:prod
    build:
      target: prod
    volumes: !reset []

  nginx:
    <<: *security-defaults
    image: ${APP_NAME:-platform}-nginx:prod
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
      target: prod
    volumes: !reset []

  db:
    <<: *security-defaults
    ports: !reset []
