# Production overrides
services:
  # kics-scan ignore-block
  php:
    image: ${APP_NAME:-platform}-php:prod
    build:
      target: prod
    volumes: !reset []

  # kics-scan ignore-block
  nginx:
    image: ${APP_NAME:-platform}-nginx:prod
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
      target: prod
    volumes: !reset []

  # kics-scan ignore-block
  db:
    ports: !reset []
