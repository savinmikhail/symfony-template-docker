# Production overrides
services:
  # kics-scan ignore-block
  php:
    image: ${APP_NAME:-platform}-php:prod
    build:
      target: prod
    volumes: !reset []

  # kics-scan ignore-block
  nginx:
    image: ${APP_NAME:-platform}-nginx:prod
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
      target: prod
    volumes: !reset []

  # kics-scan ignore-block
  db:
    ports: !reset []

  postgres-backup:
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    build:
      context: .
      dockerfile: docker/postgres-backup/Dockerfile
    restart: unless-stopped
    environment:
      TZ: "${TZ:-UTC}"
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_BACKUP_CRON: "${POSTGRES_BACKUP_CRON:-17 3 * * *}"
      POSTGRES_BACKUP_RUN_ON_START: "${POSTGRES_BACKUP_RUN_ON_START:-0}"
      POSTGRES_BACKUP_DIR: /backups
      POSTGRES_BACKUP_KEEP_DAYS: "${POSTGRES_BACKUP_KEEP_DAYS:-14}"
      POSTGRES_BACKUP_PREFIX: "${POSTGRES_BACKUP_PREFIX:-postgres}"
      POSTGRES_BACKUP_NAME: "${POSTGRES_BACKUP_NAME:-${POSTGRES_DB}}"
      POSTGRES_BACKUP_S3_ENABLED: "${POSTGRES_BACKUP_S3_ENABLED:-0}"
      POSTGRES_BACKUP_S3_ENDPOINT: "${POSTGRES_BACKUP_S3_ENDPOINT:-}"
      POSTGRES_BACKUP_S3_REGION: "${POSTGRES_BACKUP_S3_REGION:-}"
      POSTGRES_BACKUP_S3_BUCKET: "${POSTGRES_BACKUP_S3_BUCKET:-}"
      POSTGRES_BACKUP_S3_ACCESS_KEY: "${POSTGRES_BACKUP_S3_ACCESS_KEY:-}"
      POSTGRES_BACKUP_S3_SECRET_KEY: "${POSTGRES_BACKUP_S3_SECRET_KEY:-}"
      POSTGRES_BACKUP_S3_PREFIX: "${POSTGRES_BACKUP_S3_PREFIX:-postgres}"
      POSTGRES_BACKUP_S3_KEEP_DAYS: "${POSTGRES_BACKUP_S3_KEEP_DAYS:-14}"
      POSTGRES_BACKUP_S3_PATH_STYLE: "${POSTGRES_BACKUP_S3_PATH_STYLE:-1}"
    volumes:
      - ./var/backups:/backups:rw
    depends_on:
      db:
        condition: service_healthy
