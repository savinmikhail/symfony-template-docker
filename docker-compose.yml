# Symfony 7.3 template stack (PHP-FPM 8.4, nginx, PostgreSQL)
# Development usage:
#   docker compose up -d
#   docker compose exec php php bin/console
#
# Optional monitoring stack:
#   docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
#
# Production image example:
#   docker build -f docker/php/Dockerfile --target prod -t my-symfony-app .
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml build
# @see https://github.com/mfvanek/useful-sql-scripts/tree/915b5f4a62db14307175af98ddad671d3bbc8484/running_pg_in_docker/5.1.%20Tuning%20parameters%20via%20file

x-security-defaults: &security-defaults
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

services:
  php:
    <<: *security-defaults
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: dev
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - ./app:/var/www/app:rw,delegated
      - ./docker/php/conf/php.ini:/usr/local/etc/php/conf.d/zz-app.ini:ro
      - ./docker/php/conf/xdebug.ini:/usr/local/etc/php/conf.d/zz-xdebug.ini:ro
      - ./docker/php/conf/php-fpm.conf:/usr/local/etc/php-fpm.conf:ro
      - ./docker/php/conf/www.conf:/usr/local/etc/php-fpm.d/www.conf:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "SCRIPT_NAME=/fpm-ping SCRIPT_FILENAME=/fpm-ping REQUEST_METHOD=GET cgi-fcgi -bind -connect 127.0.0.1:9000 | grep -q pong"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    <<: *security-defaults
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - php
    ports:
      - "127.0.0.1:${APP_HTTP_PORT:-8080}:8080"
    volumes:
      - ./app/public:/var/www/app/public:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/fpm-ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  db:
    <<: *security-defaults
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:${APP_DB_PORT}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data:rw
       # clean tuned config loaded via command
      - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: >
      postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h 127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    <<: *security-defaults
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory ${APP_REDIS_MEMORY_LIMIT:-512mb}
      --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:${APP_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  rabbitmq:
    <<: *security-defaults
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "127.0.0.1:${APP_RABBITMQ_PORT:-5672}:5672"
      - "127.0.0.1:${APP_RABBITMQ_MGMT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "/opt/rabbitmq/sbin/rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # kics-scan ignore-block
  k6:
    <<: *security-defaults
    profiles:
      - k6
    image: grafana/k6:0.54.0
    command: ["run", "/scripts/load.js"]
    volumes:
      - ./docker/k6:/scripts:ro
    depends_on:
      - nginx

volumes:
  db-data:
